<div class="admin-main">
  <div class="admin-topbar">
    <div class="admin-page-title">Staff Management</div>
    <button class="btn btn-primary btn-sm" onclick="openCreateModal()">+ Add Staff Member</button>
  </div>
  <div class="admin-content">
    <div id="alert-container"></div>
    <div class="table-card">
      <div class="table-toolbar">
        <div class="toolbar-search"><span class="toolbar-search-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span><input type="text" id="search-input" placeholder="Search staff..."></div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Last Login</th><th>Actions</th></tr></thead>
          <tbody id="staff-tbody"><tr><td colspan="6"><div class="spinner" style="margin:16px auto;"></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Create Staff Modal -->
<div class="modal-overlay hidden" id="create-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeCreateModal()">✕</button>
    <h3 class="mb-3">Add Staff Member</h3>
    <div id="modal-alert"></div>
    <form id="create-staff-form">
      <div class="form-row">
        <div class="form-group"><label class="form-label">First Name</label><input class="form-control" id="cf_first" required placeholder="John"></div>
        <div class="form-group"><label class="form-label">Last Name</label><input class="form-control" id="cf_last" required placeholder="Doe"></div>
      </div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-control" id="cf_email" type="email" required placeholder="john@airfinder.com"></div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <div class="role-select">
          <label class="role-option"><input type="radio" name="cf_role" value="agent" required checked><div class="role-option-label">Agent</div><div class="role-option-desc">Bookings & customer support</div></label>
          <label class="role-option"><input type="radio" name="cf_role" value="finance"><div class="role-option-label">Finance</div><div class="role-option-desc">Revenue & reports</div></label>
          <label class="role-option"><input type="radio" name="cf_role" value="admin"><div class="role-option-label">Admin</div><div class="role-option-desc">Full operations access</div></label>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Temporary Password</label>
        <input class="form-control" id="cf_temp_password" type="text" placeholder="Min 8 characters (leave blank to auto-generate)" autocomplete="off">
        <div class="text-xs text-gray mt-1">Staff must change this on first login.</div>
      </div>
      <div style="display:flex;gap:10px;margin-top:16px;">
        <button type="button" class="btn btn-secondary" onclick="closeCreateModal()">Cancel</button>
        <button type="submit" class="btn btn-primary" style="flex:1;" id="create-btn">Create Account</button>
      </div>
    </form>
    <div id="create-success" class="hidden">
      <div class="alert alert-success">Staff account created!</div>
      <div class="card card-body mt-2" id="cred-box"></div>
      <button class="btn btn-primary w-full mt-2" onclick="closeCreateModal()">Done</button>
    </div>
  </div>
</div>

<!-- Edit Staff Modal -->
<div class="modal-overlay hidden" id="edit-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeEditModal()">✕</button>
    <h3 class="mb-3">Edit Staff Member</h3>
    <div id="edit-modal-alert"></div>
    <form id="edit-staff-form">
      <input type="hidden" id="ef_id">
      <div class="form-row">
        <div class="form-group"><label class="form-label">First Name</label><input class="form-control" id="ef_first" required></div>
        <div class="form-group"><label class="form-label">Last Name</label><input class="form-control" id="ef_last" required></div>
      </div>
      <div class="form-group"><label class="form-label">Email</label><input class="form-control" id="ef_email" type="email" required></div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <div class="role-select">
          <label class="role-option"><input type="radio" name="ef_role" value="agent"><div class="role-option-label">Agent</div><div class="role-option-desc">Bookings & customer support</div></label>
          <label class="role-option"><input type="radio" name="ef_role" value="finance"><div class="role-option-label">Finance</div><div class="role-option-desc">Revenue & reports</div></label>
          <label class="role-option"><input type="radio" name="ef_role" value="admin"><div class="role-option-label">Admin</div><div class="role-option-desc">Full operations access</div></label>
          <label class="role-option" id="ef_role_super_admin_option" style="display:none;"><input type="radio" name="ef_role" value="super_admin"><div class="role-option-label">Super Admin</div><div class="role-option-desc">Full system access</div></label>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <div style="display:flex;gap:10px;">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="radio" name="ef_status" value="active"> Active</label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;"><input type="radio" name="ef_status" value="inactive"> Inactive</label>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:16px;">
        <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
        <button type="submit" class="btn btn-primary" style="flex:1;" id="edit-btn">Save Changes</button>
      </div>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/admin.js"></script>
<script>
let staffList = [];
const isSuperAdmin = () => Auth.getRole() === 'super_admin';

document.addEventListener('DOMContentLoaded', async () => {
  if (!Auth.requireRole('super_admin', 'admin')) return;
  loadStaff();
  document.getElementById('search-input').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    renderStaff(staffList.filter(s =>
      s.email.includes(q) ||
      s.first_name.toLowerCase().includes(q) ||
      s.last_name.toLowerCase().includes(q)
    ));
  });
});

async function loadStaff() {
  try {
    staffList = await Admin.loadStaff();
    renderStaff(staffList);
  } catch {
    document.getElementById('staff-tbody').innerHTML = '<tr><td colspan="6" class="text-gray">Failed to load staff.</td></tr>';
  }
}

function renderStaff(list) {
  if (!list.length) {
    document.getElementById('staff-tbody').innerHTML = '<tr><td colspan="6" class="text-gray" style="text-align:center;padding:20px;">No staff found.</td></tr>';
    return;
  }
  const superAdmin = isSuperAdmin();
  document.getElementById('staff-tbody').innerHTML = list.map(s => `
    <tr>
      <td><strong>${escapeHtml(s.first_name)} ${escapeHtml(s.last_name)}</strong></td>
      <td>${escapeHtml(s.email)}</td>
      <td>${Admin.roleBadge(s.role)}</td>
      <td>${s.is_active ? '<span class="badge badge-green">Active</span>' : '<span class="badge badge-red">Inactive</span>'}</td>
      <td class="text-sm text-gray">${s.last_login ? new Date(s.last_login).toLocaleDateString('de-DE') : 'Never'}</td>
      <td style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="btn btn-secondary btn-sm" onclick="openEditModal(${JSON.stringify(s).replace(/"/g, '&quot;')})">Edit</button>
        <button class="btn btn-secondary btn-sm" onclick="resetPassword('${s.id}','${escapeHtml(s.first_name)}')">Reset PW</button>
        <button class="btn btn-sm ${s.is_active ? 'btn-danger' : 'btn-primary'}" onclick="toggleActive('${s.id}',${!s.is_active})">${s.is_active ? 'Deactivate' : 'Activate'}</button>
        ${superAdmin ? `<button class="btn btn-sm btn-danger" onclick="deleteStaff('${s.id}','${escapeHtml(s.first_name)} ${escapeHtml(s.last_name)}')">Delete</button>` : ''}
      </td>
    </tr>`).join('');
}

// Create modal
function openCreateModal() {
  document.getElementById('create-modal').classList.remove('hidden');
  document.getElementById('create-success').classList.add('hidden');
  document.getElementById('create-staff-form').classList.remove('hidden');
  document.getElementById('modal-alert').innerHTML = '';
}
function closeCreateModal() {
  document.getElementById('create-modal').classList.add('hidden');
  document.getElementById('create-staff-form').reset();
  loadStaff();
}

document.getElementById('create-staff-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('create-btn');
  btn.disabled = true; btn.textContent = 'Creating...';
  document.getElementById('modal-alert').innerHTML = '';
  try {
    const tempPw = document.getElementById('cf_temp_password').value.trim();
    const payload = {
      first_name: document.getElementById('cf_first').value,
      last_name: document.getElementById('cf_last').value,
      email: document.getElementById('cf_email').value,
      role: document.querySelector('input[name=cf_role]:checked').value,
    };
    if (tempPw) payload.temp_password = tempPw;
    const data = await Admin.createStaff(payload);
    document.getElementById('create-staff-form').classList.add('hidden');
    document.getElementById('cred-box').innerHTML =
      `<p class="text-sm"><strong>Email:</strong> ${escapeHtml(data.staff.email)}</p>` +
      `<p class="text-sm mt-1"><strong>Temp Password:</strong> <code style="background:var(--gray-100);padding:2px 6px;border-radius:4px;">${escapeHtml(data.temp_password)}</code></p>` +
      `<p class="text-xs text-gray mt-1">Share this securely. Staff must change it on first login.</p>`;
    document.getElementById('create-success').classList.remove('hidden');
  } catch (err) {
    document.getElementById('modal-alert').innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = 'Create Account';
  }
});

// Edit modal
function openEditModal(s) {
  document.getElementById('edit-modal').classList.remove('hidden');
  document.getElementById('edit-modal-alert').innerHTML = '';
  document.getElementById('ef_id').value = s.id;
  document.getElementById('ef_first').value = s.first_name;
  document.getElementById('ef_last').value = s.last_name;
  document.getElementById('ef_email').value = s.email;
  const roleRadio = document.querySelector(`input[name=ef_role][value="${s.role}"]`);
  if (roleRadio) roleRadio.checked = true;
  document.querySelector(`input[name=ef_status][value="${s.is_active ? 'active' : 'inactive'}"]`).checked = true;
  // Show super_admin option only to super admins editing super admin accounts
  document.getElementById('ef_role_super_admin_option').style.display = isSuperAdmin() ? '' : 'none';
}
function closeEditModal() {
  document.getElementById('edit-modal').classList.add('hidden');
}

document.getElementById('edit-staff-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('edit-btn');
  btn.disabled = true; btn.textContent = 'Saving...';
  document.getElementById('edit-modal-alert').innerHTML = '';
  try {
    const id = document.getElementById('ef_id').value;
    const payload = {
      first_name: document.getElementById('ef_first').value,
      last_name: document.getElementById('ef_last').value,
      email: document.getElementById('ef_email').value,
      role: document.querySelector('input[name=ef_role]:checked').value,
      is_active: document.querySelector('input[name=ef_status]:checked').value === 'active',
    };
    await Admin.updateStaff(id, payload);
    closeEditModal();
    Admin.showToast('Staff member updated');
    loadStaff();
  } catch (err) {
    document.getElementById('edit-modal-alert').innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = 'Save Changes';
  }
});

async function resetPassword(id, name) {
  if (!confirm(`Reset password for ${name}?`)) return;
  try {
    const data = await Admin.resetStaffPassword(id);
    Admin.showToast(`Password reset. Temp: ${data.temp_password}`);
  } catch (err) { Admin.showToast(err.message, 'error'); }
}

async function toggleActive(id, isActive) {
  try {
    await Admin.updateStaff(id, { is_active: isActive });
    Admin.showToast(isActive ? 'Staff activated' : 'Staff deactivated');
    loadStaff();
  } catch (err) { Admin.showToast(err.message, 'error'); }
}

async function deleteStaff(id, name) {
  if (!confirm(`Permanently delete ${name}? This cannot be undone.`)) return;
  try {
    await Admin.deleteStaff(id);
    Admin.showToast(`${name} deleted`);
    loadStaff();
  } catch (err) { Admin.showToast(err.message, 'error'); }
}
</script>
</body>
</html>
