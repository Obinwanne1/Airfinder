<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Airfinder Staff</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="auth-page" style="background:linear-gradient(135deg,#1f2937 0%,#374151 100%);">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-text" style="color:var(--green);">✈ Airfinder</div>
      <div class="auth-logo-sub">Staff Portal — Password Reset</div>
    </div>
    <h2 class="auth-title">Forgot Password</h2>
    <p class="auth-sub">Enter your staff email. We'll send a reset link valid for 1 hour.</p>
    <div id="alert"></div>
    <form id="forgot-form">
      <div class="form-group">
        <label class="form-label">Staff Email</label>
        <input class="form-control" id="email" type="email" placeholder="your@airfinder.com" required autocomplete="email">
      </div>
      <button class="btn btn-primary btn-full mt-2" type="submit" id="submit-btn">Send Reset Link</button>
    </form>
    <div id="reset-link-box" class="hidden mt-3">
      <div class="alert alert-warning" style="word-break:break-all;">
        <strong>Mail not configured.</strong> Use this link to reset your password:<br><br>
        <a id="reset-link-anchor" href="#" style="color:var(--green);font-weight:600;"></a>
      </div>
    </div>
    <div class="auth-footer mt-3">
      <a href="/admin/login.html" class="text-sm text-gray">← Back to login</a>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
document.getElementById('forgot-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Sending...';
  clearAlert();
  try {
    const data = await api.post('/staff/auth/forgot-password', {
      email: document.getElementById('email').value,
    });
    if (data.reset_url) {
      // Mail not configured — show link on screen
      const box = document.getElementById('reset-link-box');
      const anchor = document.getElementById('reset-link-anchor');
      anchor.href = data.reset_url;
      anchor.textContent = data.reset_url;
      box.classList.remove('hidden');
      showAlert('Mail not configured. Use the link below to reset your password.', 'warning');
    } else {
      showAlert('Reset link sent! Check your email inbox.', 'success');
    }
  } catch (err) {
    showAlert(err.message || 'Something went wrong. Try again.', 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Send Reset Link';
  }
});
function showAlert(msg, type = 'error') {
  document.getElementById('alert').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
}
function clearAlert() { document.getElementById('alert').innerHTML = ''; }
</script>
</body>
</html>
