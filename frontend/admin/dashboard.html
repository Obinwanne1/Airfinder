<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Airfinder Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="/css/admin.css">
</head>
<body class="admin-body">

<!-- Sidebar -->
<aside class="admin-sidebar" id="sidebar">
  <div class="admin-sidebar-logo">
    <div class="admin-logo-text">✈ Airfinder</div>
    <div class="admin-logo-sub">Staff Portal</div>
  </div>
  <nav class="admin-nav">
    <div class="admin-nav-section">Main</div>
    <a href="/admin/dashboard.html" class="admin-nav-link active"><span class="admin-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span> Dashboard</a>
    <a href="/admin/bookings.html" class="admin-nav-link"><span class="admin-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z"/></svg></span> Bookings</a>
    <a href="/admin/customers.html" class="admin-nav-link" data-role-only="super_admin,admin,agent"><span class="admin-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> Customers</a>
    <div class="admin-nav-section" data-role-only="super_admin,admin">Management</div>
    <a href="/admin/staff.html" class="admin-nav-link" data-role-only="super_admin,admin"><span class="admin-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span> Staff</a>
    <a href="/admin/finance.html" class="admin-nav-link" data-role-only="super_admin,admin,finance"><span class="admin-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10h12"/><path d="M4 14h9"/><path d="M19 6a7.7 7.7 0 0 0-5.2-2A7.9 7.9 0 0 0 6 12c0 4.4 3.5 8 7.8 8 2 0 3.8-.8 5.2-2"/></svg></span> Finance</a>
    <a href="/admin/settings.html" class="admin-nav-link" data-role-only="super_admin"><span class="admin-nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span> Settings</a>
  </nav>
  <div class="admin-sidebar-footer">
    <div class="admin-user-info">
      <div class="admin-avatar-sm" id="sidebar-avatar">SA</div>
      <div>
        <div class="admin-user-name" id="sidebar-name">Loading...</div>
        <div class="admin-user-role" id="sidebar-role">—</div>
      </div>
    </div>
    <button class="admin-logout-btn" data-admin-logout><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Sign Out</button>
  </div>
</aside>

<div class="admin-main">
  <div class="admin-topbar">
    <div class="admin-page-title">Dashboard</div>
    <div class="admin-topbar-actions">
      <a href="/" target="_blank" class="btn btn-secondary btn-sm"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg> View Site</a>
    </div>
  </div>
  <div class="admin-content">
    <div id="alert-container"></div>

    <div class="stat-grid" id="stat-grid">
      <div class="stat-card"><div class="spinner"></div></div>
    </div>

    <div class="admin-tables-row" id="tables-row">
      <div class="table-card">
        <div class="table-card-header">
          <div class="table-card-title">Recent Bookings</div>
          <a href="/admin/bookings.html" class="btn btn-secondary btn-sm">View All</a>
        </div>
        <div class="table-wrapper">
          <table>
            <thead><tr><th>Ref</th><th>Route</th><th>Total</th><th>Status</th></tr></thead>
            <tbody id="recent-bookings-tbody"><tr><td colspan="4"><div class="spinner" style="margin:12px auto;"></div></td></tr></tbody>
          </table>
        </div>
      </div>
      <div class="table-card" data-role-only="super_admin,admin,agent">
        <div class="table-card-header">
          <div class="table-card-title">Recent Customers</div>
          <a href="/admin/customers.html" class="btn btn-secondary btn-sm">View All</a>
        </div>
        <div class="table-wrapper">
          <table>
            <thead><tr><th>Name</th><th>Email</th><th>Bookings</th></tr></thead>
            <tbody id="recent-customers-tbody"><tr><td colspan="3"><div class="spinner" style="margin:12px auto;"></div></td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  if (!Auth.requireStaff()) return;

  const canSeeCustomers = ['super_admin', 'admin', 'agent'].includes(Auth.getRole());
  const [dashData, bookingsData, customersData] = await Promise.all([
    Admin.loadDashboard().catch(() => null),
    Admin.loadAllBookings(1).catch(() => null),
    canSeeCustomers ? Admin.loadCustomers(1).catch(() => null) : Promise.resolve(null),
  ]);

  if (dashData) {
    const b = dashData.bookings;
    const r = dashData.revenue;
    let html = `
      <div class="stat-card green"><div class="stat-label">Total Bookings</div><div class="stat-value">${b.total}</div><div class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z"/></svg></div></div>
      <div class="stat-card blue"><div class="stat-label">Confirmed</div><div class="stat-value">${b.confirmed}</div><div class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div></div>
      <div class="stat-card amber"><div class="stat-label">Total Revenue</div><div class="stat-value">${Admin.formatCurrency(r.total_usd)}</div><div class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10h12"/><path d="M4 14h9"/><path d="M19 6a7.7 7.7 0 0 0-5.2-2A7.9 7.9 0 0 0 6 12c0 4.4 3.5 8 7.8 8 2 0 3.8-.8 5.2-2"/></svg></div></div>
      <div class="stat-card green"><div class="stat-label">Total Customers</div><div class="stat-value">${dashData.customers}</div><div class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div></div>`;
    if (dashData.staff !== undefined) {
      html += `<div class="stat-card"><div class="stat-label">Staff Members</div><div class="stat-value">${dashData.staff}</div><div class="stat-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div></div>`;
    }
    document.getElementById('stat-grid').innerHTML = html;
  }

  if (bookingsData?.bookings) {
    document.getElementById('recent-bookings-tbody').innerHTML =
      bookingsData.bookings.slice(0,8).map(b => `
        <tr>
          <td class="td-mono">${b.reference}</td>
          <td>${b.origin}→${b.destination}</td>
          <td>${Admin.formatCurrency(b.pricing.total)}</td>
          <td>${Admin.statusBadge(b.status)}</td>
        </tr>`).join('') || '<tr><td colspan="4" class="text-gray">No bookings</td></tr>';
  }

  if (customersData?.customers) {
    document.getElementById('recent-customers-tbody').innerHTML =
      customersData.customers.slice(0,8).map(c => `
        <tr>
          <td>${c.first_name} ${c.last_name}</td>
          <td class="text-sm">${c.email}</td>
          <td>${c.booking_count}</td>
        </tr>`).join('') || '<tr><td colspan="3" class="text-gray">No customers</td></tr>';
  }
});
</script>
</body>
</html>
