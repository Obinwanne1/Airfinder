<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Airfinder Staff</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="auth-page" style="background:linear-gradient(135deg,#1f2937 0%,#374151 100%);">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-text" style="color:var(--green);">✈ Airfinder</div>
      <div class="auth-logo-sub">Staff Portal — Set New Password</div>
    </div>
    <h2 class="auth-title">Set New Password</h2>
    <p class="auth-sub">Choose a strong password for your staff account.</p>
    <div id="alert"></div>
    <div id="invalid-token" class="hidden">
      <div class="alert alert-error">This reset link is invalid or has expired. <a href="/admin/forgot-password.html" style="color:var(--green);">Request a new one.</a></div>
    </div>
    <form id="reset-form">
      <div class="form-group">
        <label class="form-label">New Password</label>
        <div class="password-toggle">
          <input class="form-control" id="new_password" type="password" required placeholder="Min 8 characters">
          <button type="button" class="toggle-btn" onclick="togglePw('new_password')"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        </div>
        <div class="strength-bar mt-1"><div class="strength-fill" id="strength-fill" style="width:0;background:var(--red);"></div></div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input class="form-control" id="confirm_password" type="password" required placeholder="Repeat new password">
      </div>
      <button class="btn btn-primary btn-full mt-2" type="submit" id="submit-btn">Reset Password</button>
    </form>
    <div class="auth-footer mt-3">
      <a href="/admin/login.html" class="text-sm text-gray">← Back to login</a>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script>
const token = new URLSearchParams(window.location.search).get('token');
if (!token) {
  document.getElementById('reset-form').classList.add('hidden');
  document.getElementById('invalid-token').classList.remove('hidden');
}

document.getElementById('new_password').addEventListener('input', function() {
  const v = this.value;
  const score = [v.length >= 8, /[A-Z]/.test(v), /[0-9]/.test(v), /[^A-Za-z0-9]/.test(v)].filter(Boolean).length;
  const colors = ['var(--red)', 'var(--red)', 'var(--amber)', 'var(--green-light)', 'var(--green)'];
  document.getElementById('strength-fill').style.width = `${score * 25}%`;
  document.getElementById('strength-fill').style.background = colors[score];
});

document.getElementById('reset-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const np = document.getElementById('new_password').value;
  const cp = document.getElementById('confirm_password').value;
  if (np !== cp) { showAlert('Passwords do not match.'); return; }
  if (np.length < 8) { showAlert('Password must be at least 8 characters.'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Resetting...';
  try {
    await api.post('/staff/auth/reset-password', { token, new_password: np });
    showAlert('Password reset! Redirecting to login...', 'success');
    setTimeout(() => { window.location.href = '/admin/login.html'; }, 2000);
  } catch (err) {
    if (err.message && err.message.includes('invalid or has expired')) {
      document.getElementById('reset-form').classList.add('hidden');
      document.getElementById('invalid-token').classList.remove('hidden');
    } else {
      showAlert(err.message || 'Reset failed. Try again.');
    }
    btn.disabled = false; btn.textContent = 'Reset Password';
  }
});

function togglePw(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}
function showAlert(msg, type = 'error') {
  document.getElementById('alert').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
}
</script>
</body>
</html>
