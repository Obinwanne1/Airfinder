<div class="admin-main">
  <div class="admin-topbar"><div class="admin-page-title">My Profile</div></div>
  <div class="admin-content">

    <div class="card card-body" style="max-width:480px;">
      <h3 class="mb-1">Account Info</h3>
      <p class="text-sm text-gray mb-3">Logged in as staff member.</p>
      <div class="price-line"><span class="text-gray">Name</span><span id="profile-name">—</span></div>
      <div class="price-line"><span class="text-gray">Email</span><span id="profile-email">—</span></div>
      <div class="price-line"><span class="text-gray">Role</span><span id="profile-role">—</span></div>
      <div class="price-line"><span class="text-gray">Last Login</span><span id="profile-last-login">—</span></div>
    </div>

    <div class="card card-body mt-3" style="max-width:480px;">
      <h3 class="mb-1">Change Password</h3>
      <p class="text-sm text-gray mb-3">Enter your current password then choose a new one.</p>
      <div id="alert"></div>
      <form id="change-pw-form">
        <div class="form-group">
          <label class="form-label">Current Password</label>
          <div class="password-toggle">
            <input class="form-control" id="current_password" type="password" required placeholder="Your current password">
            <button type="button" class="toggle-btn" onclick="togglePw('current_password')"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <div class="password-toggle">
            <input class="form-control" id="new_password" type="password" required placeholder="Min 8 characters">
            <button type="button" class="toggle-btn" onclick="togglePw('new_password')"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
          </div>
          <div class="strength-bar mt-1"><div class="strength-fill" id="strength-fill" style="width:0;background:var(--red);"></div></div>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm New Password</label>
          <input class="form-control" id="confirm_password" type="password" required placeholder="Repeat new password">
        </div>
        <button class="btn btn-primary btn-full mt-2" type="submit" id="submit-btn">Update Password</button>
      </form>
    </div>

  </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/admin.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  if (!Auth.requireStaff()) return;
  try {
    const staff = await api.get('/staff/auth/me');
    document.getElementById('profile-name').textContent = `${staff.first_name} ${staff.last_name}`;
    document.getElementById('profile-email').textContent = staff.email;
    document.getElementById('profile-role').textContent = staff.role.replace('_', ' ').replace(/\b\w/g, c => c.toUpperCase());
    document.getElementById('profile-last-login').textContent = staff.last_login ? Admin.formatDate(staff.last_login) : 'First login';
  } catch {}

  document.getElementById('new_password').addEventListener('input', function() {
    const v = this.value;
    const score = [v.length >= 8, /[A-Z]/.test(v), /[0-9]/.test(v), /[^A-Za-z0-9]/.test(v)].filter(Boolean).length;
    const colors = ['var(--red)', 'var(--red)', 'var(--amber)', 'var(--green-light)', 'var(--green)'];
    document.getElementById('strength-fill').style.width = `${score * 25}%`;
    document.getElementById('strength-fill').style.background = colors[score];
  });

  document.getElementById('change-pw-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const np = document.getElementById('new_password').value;
    const cp = document.getElementById('confirm_password').value;
    if (np !== cp) { showAlert('Passwords do not match.', 'error'); return; }
    if (np.length < 8) { showAlert('Password must be at least 8 characters.', 'error'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = 'Saving...';
    try {
      const data = await api.post('/staff/auth/change-password', {
        current_password: document.getElementById('current_password').value,
        new_password: np,
      });
      Auth.saveStaff(data.token, data.staff);
      showAlert('Password updated successfully!', 'success');
      document.getElementById('change-pw-form').reset();
      document.getElementById('strength-fill').style.width = '0';
    } catch (err) {
      showAlert(err.message || 'Failed to update password.', 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Update Password';
    }
  });
});

function togglePw(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}
function showAlert(msg, type = 'error') {
  document.getElementById('alert').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  setTimeout(() => { document.getElementById('alert').innerHTML = ''; }, 4000);
}
</script>
