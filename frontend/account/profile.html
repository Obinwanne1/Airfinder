<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — Airfinder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="/css/components.css">
<style>
.profile-section {
  background: var(--white);
  border: 1px solid var(--gray-200);
  border-radius: var(--radius);
  padding: 28px;
  margin-bottom: 20px;
}
.profile-section-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--gray-100);
  display: flex;
  align-items: center;
  gap: 8px;
}
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
@media (max-width: 560px) { .form-grid { grid-template-columns: 1fr; } }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
.form-label { font-size: 13px; font-weight: 600; color: var(--gray-600); }
.form-control {
  padding: 10px 14px;
  border: 1px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: var(--font);
  background: var(--white);
  color: var(--gray-800);
  transition: border-color .15s;
  outline: none;
}
.form-control:focus { border-color: var(--green); }
.form-control:disabled { background: var(--gray-50); color: var(--gray-400); cursor: not-allowed; }
.form-hint { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
.form-actions { display: flex; align-items: center; gap: 12px; margin-top: 20px; flex-wrap: wrap; }

.member-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--green-pale);
  color: var(--green-dark);
  font-size: 12px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 99px;
}

.pw-strength { height: 4px; border-radius: 2px; background: var(--gray-200); margin-top: 6px; overflow: hidden; }
.pw-strength-fill { height: 100%; border-radius: 2px; transition: width .3s, background .3s; }

.alert-inline {
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  display: none;
}
.alert-inline.success { background: var(--green-pale); color: var(--green-dark); display: block; }
.alert-inline.error   { background: #fef2f2; color: var(--red); display: block; }
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-brand">✈ Airfinder</a>
    <div class="navbar-links">
      <a href="/" class="navbar-link">Search Flights</a>
      <a href="#" class="navbar-link" data-auth-logout>Logout</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="account-layout">
    <aside class="account-sidebar">
      <div class="account-avatar" id="avatar">JD</div>
      <div class="account-name" id="user-name">Loading...</div>
      <div class="account-email" id="user-email"></div>
      <ul class="account-nav">
        <li><a href="/account/dashboard.html">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Dashboard</a></li>
        <li><a href="/account/bookings.html">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z"/></svg>
          My Bookings</a></li>
        <li><a href="/account/profile.html" class="active">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          My Profile</a></li>
        <li><a href="/">✈ Search Flights</a></li>
        <li><a href="#" data-auth-logout>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout</a></li>
      </ul>
    </aside>

    <main>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px;">
        <h2 style="margin:0;">My Profile</h2>
        <span class="member-badge" id="member-since">✓ Member</span>
      </div>

      <!-- Profile details -->
      <div class="profile-section">
        <div class="profile-section-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Personal Details
        </div>
        <div id="profile-alert" class="alert-inline" style="margin-bottom:16px;"></div>
        <form id="profile-form" novalidate>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label" for="first-name">First Name</label>
              <input class="form-control" id="first-name" type="text" placeholder="First name" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="last-name">Last Name</label>
              <input class="form-control" id="last-name" type="text" placeholder="Last name" required>
            </div>
            <div class="form-group full">
              <label class="form-label" for="email">Email Address</label>
              <input class="form-control" id="email" type="email" disabled>
              <span class="form-hint">Email cannot be changed. Contact support if needed.</span>
            </div>
            <div class="form-group full">
              <label class="form-label" for="phone">Phone Number</label>
              <input class="form-control" id="phone" type="tel" placeholder="+44 7700 900000">
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit" id="save-profile-btn">Save Changes</button>
            <span id="profile-saving" style="font-size:13px;color:var(--gray-400);display:none;">Saving...</span>
          </div>
        </form>
      </div>

      <!-- Change password -->
      <div class="profile-section">
        <div class="profile-section-title">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Change Password
        </div>
        <div id="pw-alert" class="alert-inline" style="margin-bottom:16px;"></div>
        <form id="pw-form" novalidate>
          <div class="form-grid">
            <div class="form-group full">
              <label class="form-label" for="current-pw">Current Password</label>
              <input class="form-control" id="current-pw" type="password" placeholder="Enter current password" autocomplete="current-password">
            </div>
            <div class="form-group">
              <label class="form-label" for="new-pw">New Password</label>
              <input class="form-control" id="new-pw" type="password" placeholder="Min. 8 characters" autocomplete="new-password">
              <div class="pw-strength"><div class="pw-strength-fill" id="pw-strength-bar" style="width:0%;background:var(--gray-200);"></div></div>
              <span class="form-hint" id="pw-strength-label"></span>
            </div>
            <div class="form-group">
              <label class="form-label" for="confirm-pw">Confirm New Password</label>
              <input class="form-control" id="confirm-pw" type="password" placeholder="Repeat new password" autocomplete="new-password">
              <span class="form-hint" id="pw-match-hint"></span>
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" type="submit" id="save-pw-btn">Update Password</button>
            <span id="pw-saving" style="font-size:13px;color:var(--gray-400);display:none;">Updating...</span>
          </div>
        </form>
      </div>
    </main>
  </div>
</div>

<script src="/js/locale.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  if (!Auth.requireLogin()) return;

  // Load profile from server (authoritative source)
  let user;
  try {
    user = await api.get('/auth/me');
  } catch {
    user = Auth.getUser();
  }
  if (!user) return;

  // Sidebar
  document.getElementById('avatar').textContent = (user.first_name?.[0] || '') + (user.last_name?.[0] || '');
  document.getElementById('user-name').textContent = `${user.first_name} ${user.last_name}`;
  document.getElementById('user-email').textContent = user.email;

  // Member since
  if (user.created_at) {
    const since = new Date(user.created_at).toLocaleDateString('en-GB', { month: 'short', year: 'numeric' });
    document.getElementById('member-since').textContent = `✓ Member since ${since}`;
  }

  // Populate fields
  document.getElementById('first-name').value = user.first_name || '';
  document.getElementById('last-name').value = user.last_name || '';
  document.getElementById('email').value = user.email || '';
  document.getElementById('phone').value = user.phone || '';

  // Profile save
  document.getElementById('profile-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('save-profile-btn');
    const saving = document.getElementById('profile-saving');
    const alertEl = document.getElementById('profile-alert');
    clearAlert(alertEl);

    const first_name = document.getElementById('first-name').value.trim();
    const last_name = document.getElementById('last-name').value.trim();
    const phone = document.getElementById('phone').value.trim();

    if (!first_name || !last_name) {
      showAlert(alertEl, 'First name and last name are required.', 'error');
      return;
    }

    btn.disabled = true;
    saving.style.display = 'inline';
    try {
      const updated = await api.put('/auth/me', { first_name, last_name, phone });
      // Update stored token user data
      const stored = Auth.getUser();
      if (stored) {
        stored.first_name = updated.user.first_name;
        stored.last_name = updated.user.last_name;
        stored.phone = updated.user.phone;
        localStorage.setItem('af_user', JSON.stringify(stored));
      }
      document.getElementById('avatar').textContent = (updated.user.first_name?.[0] || '') + (updated.user.last_name?.[0] || '');
      document.getElementById('user-name').textContent = `${updated.user.first_name} ${updated.user.last_name}`;
      showAlert(alertEl, 'Profile updated successfully.', 'success');
    } catch (err) {
      showAlert(alertEl, err.message || 'Could not save profile.', 'error');
    } finally {
      btn.disabled = false;
      saving.style.display = 'none';
    }
  });

  // Password strength meter
  document.getElementById('new-pw').addEventListener('input', function () {
    const { score, label, color } = pwStrength(this.value);
    const bar = document.getElementById('pw-strength-bar');
    bar.style.width = (score * 25) + '%';
    bar.style.background = color;
    document.getElementById('pw-strength-label').textContent = this.value ? label : '';
    checkMatch();
  });

  document.getElementById('confirm-pw').addEventListener('input', checkMatch);

  function checkMatch() {
    const nw = document.getElementById('new-pw').value;
    const cf = document.getElementById('confirm-pw').value;
    const hint = document.getElementById('pw-match-hint');
    if (!cf) { hint.textContent = ''; return; }
    hint.textContent = nw === cf ? '✓ Passwords match' : '✗ Passwords do not match';
    hint.style.color = nw === cf ? 'var(--green)' : 'var(--red)';
  }

  // Password change
  document.getElementById('pw-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('save-pw-btn');
    const saving = document.getElementById('pw-saving');
    const alertEl = document.getElementById('pw-alert');
    clearAlert(alertEl);

    const current_password = document.getElementById('current-pw').value;
    const new_password = document.getElementById('new-pw').value;
    const confirm_password = document.getElementById('confirm-pw').value;

    if (!current_password || !new_password || !confirm_password) {
      showAlert(alertEl, 'All password fields are required.', 'error');
      return;
    }
    if (new_password !== confirm_password) {
      showAlert(alertEl, 'New passwords do not match.', 'error');
      return;
    }
    if (new_password.length < 8) {
      showAlert(alertEl, 'New password must be at least 8 characters.', 'error');
      return;
    }

    btn.disabled = true;
    saving.style.display = 'inline';
    try {
      await api.post('/auth/change-password', { current_password, new_password, confirm_password });
      showAlert(alertEl, 'Password changed successfully.', 'success');
      document.getElementById('pw-form').reset();
      document.getElementById('pw-strength-bar').style.width = '0%';
      document.getElementById('pw-strength-label').textContent = '';
      document.getElementById('pw-match-hint').textContent = '';
    } catch (err) {
      showAlert(alertEl, err.message || 'Could not change password.', 'error');
    } finally {
      btn.disabled = false;
      saving.style.display = 'none';
    }
  });
});

function pwStrength(pw) {
  let score = 0;
  if (pw.length >= 8)  score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  score = Math.min(score, 4);
  const map = [
    { label: 'Very weak', color: '#dc2626' },
    { label: 'Weak',      color: '#f59e0b' },
    { label: 'Fair',      color: '#f59e0b' },
    { label: 'Strong',    color: '#16a34a' },
    { label: 'Very strong', color: '#15803d' },
  ];
  return { score, ...map[score] };
}

function showAlert(el, msg, type) {
  el.textContent = msg;
  el.className = 'alert-inline ' + type;
  setTimeout(() => clearAlert(el), 5000);
}

function clearAlert(el) {
  el.textContent = '';
  el.className = 'alert-inline';
}
</script>
</body>
</html>
