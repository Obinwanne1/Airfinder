<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard — Airfinder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="/css/components.css">
<style>
.next-trip-card {
  background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 100%);
  border-radius: var(--radius-lg);
  padding: 28px 32px;
  color: #fff;
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}
.next-trip-label { font-size: 12px; font-weight: 700; opacity: .7; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
.next-trip-route { font-size: 2rem; font-weight: 900; letter-spacing: -.5px; }
.next-trip-meta { font-size: 14px; opacity: .85; margin-top: 6px; }
.next-trip-ref { font-size: 12px; font-family: monospace; opacity: .65; margin-top: 4px; }
.next-trip-cta .btn { background: rgba(255,255,255,.18); color: #fff; border: 1.5px solid rgba(255,255,255,.4); }
.next-trip-cta .btn:hover { background: rgba(255,255,255,.28); }
.next-trip-days { text-align: right; }
.next-trip-days-num { font-size: 2.8rem; font-weight: 900; line-height: 1; }
.next-trip-days-label { font-size: 12px; opacity: .7; margin-top: 2px; }

.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
@media (max-width: 640px) { .stat-grid { grid-template-columns: 1fr; } }
.stat-card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--gray-200);
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.stat-card.green { border-left: 4px solid var(--green); }
.stat-card.blue  { border-left: 4px solid var(--blue); }
.stat-card.amber { border-left: 4px solid var(--amber); }
.stat-label { font-size: 12px; font-weight: 600; color: var(--gray-400); text-transform: uppercase; letter-spacing: .5px; }
.stat-value { font-size: 1.8rem; font-weight: 900; color: var(--gray-800); line-height: 1.1; }

.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.section-header h3 { margin: 0; }

.recent-booking-card {
  background: var(--white);
  border-radius: var(--radius);
  border: 1px solid var(--gray-200);
  padding: 18px 20px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
  transition: border-color .15s;
}
.recent-booking-card:hover { border-color: var(--green); }
.rbc-route { font-size: 1.1rem; font-weight: 800; min-width: 120px; }
.rbc-meta { flex: 1; min-width: 160px; }
.rbc-airline { font-size: 13px; color: var(--gray-600); }
.rbc-date { font-size: 13px; color: var(--gray-600); }
.rbc-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.rbc-total { font-size: 1rem; font-weight: 800; color: var(--green); }
.rbc-ref { font-size: 11px; font-family: monospace; color: var(--gray-400); }
</style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-brand">✈ Airfinder</a>
    <div class="navbar-links">
      <a href="/" class="navbar-link">Search Flights</a>
      <a href="/flight-status.html" class="navbar-link">Flight Status</a>
      <a href="#" class="navbar-link" data-auth-logout>Logout</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="account-layout">
    <aside class="account-sidebar">
      <div class="account-avatar" id="avatar">JD</div>
      <div class="account-name" id="user-name">Loading...</div>
      <div class="account-email" id="user-email"></div>
      <ul class="account-nav">
        <li><a href="/account/dashboard.html" class="active">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Dashboard</a></li>
        <li><a href="/account/bookings.html">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2z"/></svg>
          My Bookings</a></li>
        <li><a href="/account/profile.html">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          My Profile</a></li>
        <li><a href="/">✈ Search Flights</a></li>
        <li><a href="#" data-auth-logout>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout</a></li>
      </ul>
    </aside>

    <main>
      <h2 class="mb-3">Welcome back, <span id="greeting-name">—</span>!</h2>

      <!-- Next trip hero -->
      <div id="next-trip-section"></div>

      <!-- Stats -->
      <div class="stat-grid">
        <div class="stat-card green">
          <div class="stat-label">Total Bookings</div>
          <div class="stat-value" id="stat-bookings">—</div>
        </div>
        <div class="stat-card blue">
          <div class="stat-label">Total Spent</div>
          <div class="stat-value" id="stat-spent">—</div>
        </div>
        <div class="stat-card amber">
          <div class="stat-label">Upcoming Trips</div>
          <div class="stat-value" id="stat-upcoming">—</div>
        </div>
      </div>

      <!-- Recent bookings -->
      <div class="section-header">
        <h3>Recent Bookings</h3>
        <a href="/account/bookings.html" class="btn btn-secondary btn-sm">View All</a>
      </div>
      <div id="recent-bookings"><div class="spinner"></div></div>

      <div class="mt-4 text-center">
        <a href="/" class="btn btn-primary">+ Book a New Flight</a>
      </div>
    </main>
  </div>
</div>

<script src="/js/locale.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  if (!Auth.requireLogin()) return;
  const user = Auth.getUser();
  if (!user) return;

  document.getElementById('avatar').textContent = (user.first_name?.[0] || '') + (user.last_name?.[0] || '');
  document.getElementById('user-name').textContent = `${user.first_name} ${user.last_name}`;
  document.getElementById('user-email').textContent = user.email;
  document.getElementById('greeting-name').textContent = user.first_name;

  try {
    const bookings = await api.get('/bookings');
    const today = new Date().toISOString().split('T')[0];

    // Stats
    document.getElementById('stat-bookings').textContent = bookings.length;
    const confirmed = bookings.filter(b => b.status === 'confirmed');
    const spent = confirmed.reduce((s, b) => s + b.pricing.total, 0);
    document.getElementById('stat-spent').textContent = fmtCurrency(spent);
    const upcoming = confirmed.filter(b => b.departure_date >= today);
    document.getElementById('stat-upcoming').textContent = upcoming.length;

    // Next trip hero
    const nextTrip = upcoming.sort((a, b) => a.departure_date.localeCompare(b.departure_date))[0];
    if (nextTrip) {
      const depDate = new Date(nextTrip.departure_date);
      const daysOut = Math.ceil((depDate - new Date()) / 86400000);
      document.getElementById('next-trip-section').innerHTML = `
        <div class="next-trip-card">
          <div>
            <div class="next-trip-label">✈ Your Next Trip</div>
            <div class="next-trip-route">${nextTrip.origin} → ${nextTrip.destination}</div>
            <div class="next-trip-meta">${nextTrip.airline}${nextTrip.flight_number ? ' · ' + nextTrip.flight_number : ''} · ${nextTrip.cabin_class}</div>
            <div class="next-trip-meta">${formatDate(nextTrip.departure_date)}</div>
            <div class="next-trip-ref">${nextTrip.reference}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:12px;">
            <div class="next-trip-days">
              <div class="next-trip-days-num">${daysOut}</div>
              <div class="next-trip-days-label">day${daysOut !== 1 ? 's' : ''} to go</div>
            </div>
            <a href="/account/bookings.html" class="btn btn-sm next-trip-cta">View booking</a>
          </div>
        </div>`;
    }

    // Recent bookings list
    const recent = bookings.slice(0, 5);
    if (recent.length === 0) {
      document.getElementById('recent-bookings').innerHTML =
        '<div class="card card-body text-center"><p class="text-gray">No bookings yet.</p><a href="/" class="btn btn-primary mt-2">Search Flights</a></div>';
    } else {
      document.getElementById('recent-bookings').innerHTML = recent.map(b => `
        <div class="recent-booking-card">
          <div class="rbc-route">${b.origin} → ${b.destination}</div>
          <div class="rbc-meta">
            <div class="rbc-airline">${b.airline}${b.flight_number ? ' · ' + b.flight_number : ''}</div>
            <div class="rbc-date">${formatDate(b.departure_date)} · ${b.cabin_class} · ${b.passenger_count} pax</div>
          </div>
          <div class="rbc-right">
            <span class="badge ${statusBadge(b.status)}">${b.status}</span>
            <div class="rbc-total">${fmtCurrency(b.pricing.total)}</div>
            <div class="rbc-ref">${b.reference}</div>
          </div>
        </div>`).join('');
    }
  } catch (e) {
    document.getElementById('recent-bookings').innerHTML = '<p class="text-gray">Could not load bookings.</p>';
  }
});

function formatDate(d) {
  return new Date(d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function statusBadge(s) {
  return s === 'confirmed' ? 'badge-green' : s === 'cancelled' ? 'badge-red' : 'badge-amber';
}
</script>
</body>
</html>
